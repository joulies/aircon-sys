<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="200" height="200" fill="white"/>

  <!-- QR pattern (sample) -->
  <g fill="black">
    <!-- Top-left finder pattern -->
    <rect x="10" y="10" width="40" height="40"/>
    <rect x="15" y="15" width="30" height="30" fill="white"/>
    <rect x="20" y="20" width="20" height="20"/>

    <!-- Top-right finder pattern -->
    <rect x="150" y="10" width="40" height="40"/>
    <rect x="155" y="15" width="30" height="30" fill="white"/>
    <rect x="160" y="20" width="20" height="20"/>

    <!-- Bottom-left finder pattern -->
    <rect x="10" y="150" width="40" height="40"/>
    <rect x="15" y="155" width="30" height="30" fill="white"/>
    <rect x="20" y="160" width="20" height="20"/>

    <!-- Timing patterns -->
    <rect x="55" y="12" width="90" height="2"/>
    <rect x="12" y="55" width="2" height="90"/>

    <!-- Sample data pattern -->
    <rect x="60" y="60" width="80" height="80"/>
    <rect x="65" y="65" width="70" height="70" fill="white"/>

    <!-- Various dots for data -->
    <rect x="70" y="70" width="4" height="4"/>
    <rect x="78" y="70" width="4" height="4"/>
    <rect x="86" y="70" width="4" height="4"/>
    <rect x="94" y="70" width="4" height="4"/>
    <rect x="102" y="70" width="4" height="4"/>
    <rect x="110" y="70" width="4" height="4"/>
    <rect x="118" y="70" width="4" height="4"/>
    <rect x="126" y="70" width="4" height="4"/>

    <rect x="70" y="78" width="4" height="4"/>
    <rect x="78" y="78" width="4" height="4"/>
    <rect x="94" y="78" width="4" height="4"/>
    <rect x="102" y="78" width="4" height="4"/>
    <rect x="118" y="78" width="4" height="4"/>

    <rect x="70" y="86" width="4" height="4"/>
    <rect x="78" y="86" width="4" height="4"/>
    <rect x="86" y="86" width="4" height="4"/>
    <rect x="94" y="86" width="4" height="4"/>
    <rect x="102" y="86" width="4" height="4"/>
    <rect x="110" y="86" width="4" height="4"/>
    <rect x="118" y="86" width="4" height="4"/>

    <rect x="70" y="94" width="4" height="4"/>
    <rect x="94" y="94" width="4" height="4"/>
    <rect x="110" y="94" width="4" height="4"/>
    <rect x="126" y="94" width="4" height="4"/>

    <rect x="78" y="102" width="4" height="4"/>
    <rect x="86" y="102" width="4" height="4"/>
    <rect x="102" y="102" width="4" height="4"/>
    <rect x="118" y="102" width="4" height="4"/>
    <rect x="126" y="102" width="4" height="4"/>

    <rect x="70" y="110" width="4" height="4"/>
    <rect x="94" y="110" width="4" height="4"/>
    <rect x="110" y="110" width="4" height="4"/>
    <rect x="118" y="110" width="4" height="4"/>

    <rect x="78" y="118" width="4" height="4"/>
    <rect x="86" y="118" width="4" height="4"/>
    <rect x="94" y="118" width="4" height="4"/>
    <rect x="102" y="118" width="4" height="4"/>
    <rect x="110" y="118" width="4" height="4"/>
    <rect x="126" y="118" width="4" height="4"/>
  </g>

  <!-- GCash logo indicator -->
  <circle cx="100" cy="100" r="15" fill="#001DFF" opacity="0.8"/>
  <text x="100" y="105" font-size="12" font-weight="bold" fill="white" text-anchor="middle">GC</text>
</svg>